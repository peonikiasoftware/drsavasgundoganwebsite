{% load i18n %}
{# Cookie banner. On mobile (<xl) we sit above the sticky Randevu bar (~56px tall)
   so both are visible and nothing overlaps. Dismisses via localStorage. #}
<div x-data="cookieBanner" x-cloak x-show="!accepted"
     x-transition:enter="transition duration-400"
     x-transition:enter-start="opacity-0 translate-y-4"
     x-transition:enter-end="opacity-100 translate-y-0"
     class="fixed left-3 right-3 z-[55]
            bottom-[calc(72px+env(safe-area-inset-bottom,0px))]
            xl:bottom-8 xl:left-auto xl:right-8 xl:max-w-md">
  <div class="bg-white border border-ink-100 rounded-2xl shadow-soft-lift p-4 sm:p-5 flex gap-3 sm:gap-4 items-start">
    <span class="shrink-0 w-9 h-9 rounded-xl bg-teal-50 text-teal-700 inline-flex items-center justify-center">
      <i data-lucide="cookie" class="w-4 h-4"></i>
    </span>
    <div class="flex-1 min-w-0">
      <p class="text-xs sm:text-sm text-ink-700 leading-relaxed">
        {{ site_settings.cookie_banner_text }}
        <a href="{% url 'core:kvkk' %}" class="btn-ghost text-xs sm:text-sm ml-1">{% trans "Detaylar" %}</a>
      </p>
      <div class="mt-3 flex gap-2">
        <button @click="accept()" class="btn-primary !px-4 !py-2 text-sm">
          {% trans "Kabul Et" %}
        </button>
      </div>
    </div>
  </div>
</div>
<style>[x-cloak]{display:none !important;}</style>
